name: Validate terraform fmt and validate

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    name: terraform check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform -chdir=infrastructure init -backend=false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform -chdir=infrastructure validate
        continue-on-error: true

      - name: Update Summary & Exit
        run: |
          echo "### Terraform Check Results" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ steps.fmt.outcome }}" == "success" ]]; then
            echo "✅ Format: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Format: Failed (Run 'terraform fmt -recursive' to fix)" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.validate.outcome }}" == "success" ]]; then
            echo "✅ Validate: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Validate: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "${{ steps.fmt.outcome }}" != "success" || "${{ steps.validate.outcome }}" != "success" ]]; then
            exit 1
          fi
